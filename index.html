<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D cube</title>
  <link rel="stylesheet" href="./style.css" />
  <script defer src="./main.js"></script>
  <!-- Swiper web-component bundle (only once) -->
  <script defer src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-element-bundle.min.js"></script>
</head>
<body>
  <!-- Simple Swiper demo -->
  <swiper-container class="mySwiper" pagination="true" effect="cube" loop="true" autoplay="true">
    <swiper-slide><img src="https://swiperjs.com/demos/images/nature-1.jpg" alt="Slide 1"></swiper-slide>
    <swiper-slide><img src="https://swiperjs.com/demos/images/nature-2.jpg" alt="Slide 2"></swiper-slide>
    <swiper-slide><img src="https://swiperjs.com/demos/images/nature-3.jpg" alt="Slide 3"></swiper-slide>
    <swiper-slide><img src="https://swiperjs.com/demos/images/nature-4.jpg" alt="Slide 4"></swiper-slide>
  </swiper-container>

  <!-- 3D cube scene -->
  <div class="scene">
    <div class="cube">
      <div class="face front"><img src="https://swiperjs.com/demos/images/nature-1.jpg" alt="Front"></div>
      <div class="face back"><img src="https://swiperjs.com/demos/images/nature-2.jpg" alt="Back"></div>
      <div class="face left"><img src="https://swiperjs.com/demos/images/nature-3.jpg" alt="Left"></div>
      <div class="face right"><img src="https://swiperjs.com/demos/images/nature-4.jpg" alt="Right"></div>
      <div class="face top"><img src="https://swiperjs.com/demos/images/nature-1.jpg" alt="Top"></div>
      <div class="face bottom"><img src="https://swiperjs.com/demos/images/nature-2.jpg" alt="Bottom"></div>
    </div>
  </div>
</body>
</html>
